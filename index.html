<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A mesmerizing 3D murmuration simulator with position-based color visualization">
  <title>Murmuration Simulator</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐦</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }
    
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    canvas {
      display: block;
    }
    
    #info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      pointer-events: none;
      z-index: 100;
    }
    
    #info kbd {
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 6px;
      border-radius: 3px;
      margin: 0 2px;
    }
    
    #pause-indicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255, 255, 255, 0.8);
      font-size: 48px;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    #pause-indicator.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="pause-indicator">⏸ PAUSED</div>
  <div id="info">
    <kbd>Space</kbd> Pause &nbsp;
    <kbd>R</kbd> Reset &nbsp;
    <kbd>F</kbd> Fullscreen &nbsp;
    <kbd>S</kbd> Screenshot &nbsp;
    <kbd>T</kbd> Toggle Tracking &nbsp;
    <kbd>P</kbd> Toggle Preview
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
